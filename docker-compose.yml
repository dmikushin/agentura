services:
  agentura-server:
    build: .
    container_name: agentura-server
    restart: unless-stopped
    pid: host                          # see host PIDs for liveness checks
    user: "${UID:-1000}:${GID:-1000}"  # run as host user for file permissions
    ports:
      - "${AGENTURA_PORT:-7850}:${AGENTURA_PORT:-7850}"
    volumes:
      - streams:/data                   # named volume for stream files
      - ${TMUX_SOCKET_PATH}:${TMUX_SOCKET_PATH}:ro  # host tmux socket
      - ./secrets/authorized_keys:/app/secrets/authorized_keys:ro
      - ./hosts.json:/data/hosts.json:ro
      - ./bin/impl-linux-amd64:/app/bin/linux/amd64:ro
      - ./bin/impl-linux-arm64:/app/bin/linux/arm64:ro
    environment:
      - TMUX_TMPDIR=/tmp
      - AUTHORIZED_KEYS=/app/secrets/authorized_keys
      - AGENTURA_PORT=${AGENTURA_PORT:-7850}
      - DATABASE_URL=postgresql://agentura:${POSTGRES_PASSWORD:-agentura}@postgres:5432/agentura
      - DATABASE_BACKEND=postgres
      - EMBEDDING_PROVIDER=ollama
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      - EMBEDDING_DIM=768
      - EMBEDDING_CACHE_DIR=/data/embedding_cache
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama
    container_name: agentura-ollama
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    # Pull embedding model on first start
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 3 && ollama pull nomic-embed-text && wait"]

  postgres:
    image: pgvector/pgvector:pg16
    container_name: agentura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentura
      POSTGRES_USER: agentura
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentura}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentura"]
      interval: 5s
      timeout: 5s
      retries: 5

  agentura-tunnel:
    image: jnovack/autossh
    container_name: agentura-tunnel
    environment:
      - SSH_REMOTE_USER=${GATEWAY_USER}
      - SSH_REMOTE_HOST=${GATEWAY_HOST}
      - SSH_REMOTE_PORT=${GATEWAY_PORT:-22}
      - SSH_TARGET_HOST=agentura-server
      - SSH_TARGET_PORT=${AGENTURA_PORT:-7850}
      - SSH_TUNNEL_PORT=${TUNNEL_PORT}
    restart: always
    volumes:
      - ${TUNNEL_KEY}:/id_rsa:ro

volumes:
  streams:
  pgdata:
  ollama:
