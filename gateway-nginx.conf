# Agentura HTTPS gateway — nginx site config template
#
# Replace DOMAIN and TUNNEL_PORT with your values, then:
#   sudo cp gateway-nginx.conf /etc/nginx/sites-available/DOMAIN
#   sudo ln -s /etc/nginx/sites-available/DOMAIN /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d DOMAIN --redirect
#   sudo systemctl reload nginx
#
# After certbot runs, update the listen directive to:
#   listen localhost:443 ssl;

server {
    server_name DOMAIN;

    location / {
        proxy_pass http://127.0.0.1:TUNNEL_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen localhost:443 ssl;

    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


server {
    if ($host = DOMAIN) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name DOMAIN;
    return 404;
}
